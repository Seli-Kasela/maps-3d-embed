<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Google Maps Embed</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>3D Google Maps Embed</h1>
            <p>View your location in immersive 3D</p>
        </header>

        <div class="content">
            <div class="map-container">
                <div id="map"></div>
            </div>

            <aside class="info-panel">
                <h2>Your Location</h2>
                <div id="location-info">
                    <p>Loading location data...</p>
                </div>
                <button id="refresh-btn">Refresh Location</button>
            </aside>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?v=beta&key=YOUR_API_KEY&libraries=threejs"></script>
    <script src="/static/app.js"></script>
</body>
</html>
