<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>
        GeoVision3D | Seli Kasela Creative Studio
    </title>

    <meta
        name="description"
        content="Elite Geo Intelligence & 3D Mapping Platform"
    />

    <!-- GOOGLE FONT -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    />

    <!-- LEAFLET -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    />

    <!-- MAIN CSS -->
    <link
        rel="stylesheet"
        href="/static/styles.css"
    />

</head>

<body>

    <!-- LOADING -->
    <div id="map-loading">

        <div class="loader"></div>

        <p>Initializing GeoVision3D...</p>

    </div>

    <!-- MAIN -->
    <div class="container">

        <!-- MAP -->
        <div id="map"></div>

        <!-- SIDEBAR -->
        <aside class="info-panel">

            <div class="brand">

                <h1>🌍 GeoVision3D</h1>

                <p>
                    Real-Time Geo Intelligence Platform
                </p>

            </div>

            <!-- LOCATION INFO -->
            <div id="location-info">

                <p>Loading location intelligence...</p>

            </div>

            <!-- BUTTONS -->
            <div class="controls">

                <button id="refresh-btn">
                    🔄 Refresh Location
                </button>

                <button onclick="switchMapType('satellite')">
                    🛰️ Satellite
                </button>

                <button onclick="switchMapType('roadmap')">
                    🗺️ Roadmap
                </button>

                <button onclick="switchMapType('hybrid')">
                    🌐 Hybrid
                </button>

                <button onclick="rotateMap(90)">
                    🔁 Rotate
                </button>

                <button onclick="tiltMap(45)">
                    📐 Tilt
                </button>

            </div>

        </aside>

    </div>

    <!-- LEAFLET JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- GOOGLE MAPS -->
    <script
        src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"
    ></script>

    <!-- APP -->
    <script src="/static/app.js"></script>

</body>

</html>
